---
- name: Kali Setup
  hosts: localhost
  become: yes
  tasks:

     - name: Set Hostname
       ansible.builtin.hostname:
          name: "kali"

     - name: Ensure APT uses IPv4 by default
       copy:
         dest: /etc/apt/apt.conf.d/99force-ipv4
         content: 'Acquire::ForceIPv4 "true";'
         owner: root
         group: root
         mode: '0644'

     - name: Update apt repo and cache
       apt: 
          update_cache: yes
          cache_valid_time: 3600
          upgrade: yes            
            
     - name: Remove old Python httpx
       apt:
            name:
                - python3-httpx
            state: absent

     - name: Check Ansible-Dependencies
       apt:
            name:
                - python3
                - python3-pip
                - wget
                - golang-go
                - trufflehog
                - gpg
                - apt-transport-https
                - pipx
                - rustc
                - python2-dev
                - build-essential
                - yara
                - gobuster
                - seclists
                - kali-desktop-i3
                - docker.io
                - docker-compose
                - bloodyad
                - default-jdk
                - unzip
                - httpx-toolkit
                
     - name: Install VSCode x86
       ansible.builtin.apt:
         deb: https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-x64
       when: ansible_facts.architecture == "x86_64"

     - name: Install VSCode ARM
       ansible.builtin.apt:
         deb: https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-arm64
       when: ansible_facts.architecture != "x86_64"

     - name: Install impacket
       ansible.builtin.command: 'pipx install git+https://github.com/fortra/impacket'

     - name: Git Pull ponyshell
       git:
         repo: https://github.com/flozz/p0wny-shell
         dest: /opt/tools/p0wny-shell

     - name: Git Pull PowerTools
       git:
         repo: https://github.com/PowerShellEmpire/PowerTools
         dest: /opt/tools/powertools

     - name: Git Pull powercat
       git:
         repo: https://github.com/besimorhino/powercat
         dest: /opt/tools/powercat
         
     - name: Git Pull bloodhound.py
       git:
         repo: https://github.com/dirkjanm/BloodHound.py
         dest: /opt/tools/BloodHound.py

     - name: Git Pull BloodHound
       git:
         repo: https://github.com/SpecterOps/BloodHound
         dest: /opt/tools/BloodHound
         
     - name: Git Pull pywhisker
       git:
         repo: https://github.com/ShutdownRepo/pywhisker
         dest: /opt/tools/pywhisker

     - name: Git Pull targetedKerberoast
       git:
         repo: https://github.com/ShutdownRepo/targetedKerberoast
         dest: /opt/tools/targetedKerberoast

     - name: Git Pull username-anarchy
       git:
         repo: https://github.com/urbanadventurer/username-anarchy
         dest: /opt/tools/username-anarchy

     - name: Install ensurepath
       ansible.builtin.command: 'pipx ensurepath'
       
     - name: Install netexec
       ansible.builtin.command: 'pipx install git+https://github.com/Pennyw0rth/NetExec'

     - name: Creates directory
       ansible.builtin.file:
         path: /opt/tools/peas
         state: directory

     - name: Download linpeas
       ansible.builtin.get_url:
         url: https://github.com/peass-ng/PEASS-ng/releases/latest/download/linpeas.sh
         dest: /opt/tools/peas/

     - name: Download winpeas
       ansible.builtin.get_url:
         url: https://github.com/peass-ng/PEASS-ng/releases/latest/download/winPEASany_ofs.exe
         dest: /opt/tools/peas/winpeas.exe

     - name: Download Kerbrute
       ansible.builtin.get_url:
         url: https://github.com/ropnop/kerbrute/releases/latest/download/kerbrute_linux_amd64
         dest: /opt/tools/

     - name: Download volatitilty2
       git:
         repo: https://github.com/volatilityfoundation/volatility
         dest: /opt/tools/volatility

     - name: Download volatitilty3
       git:
         repo: https://github.com/volatilityfoundation/volatility3
         dest: /opt/tools/volatility3

     - name: Download volatility plugins
       git:
         repo: https://github.com/superponible/volatility-plugins
         dest: /opt/tools/volatility-plugins

     - name: Download PKINIT Tools
       git:
         repo: https://github.com/dirkjanm/PKINITtools
         dest: /opt/tools/PKINITtools
         
     - name: Create Resocks-Folder
       ansible.builtin.file:
         path: /opt/tools/resocks
         state: directory

     - name: Download resocks
       ansible.builtin.get_url:
         url: https://github.com/RedTeamPentesting/resocks/releases/latest/download/resocks_Linux_x86_64.tar.gz
         dest: /opt/tools/resocks/
       when: ansible_facts.architecture == "x86_64"

     - name: Download resocks
       ansible.builtin.get_url:
         url: https://github.com/RedTeamPentesting/resocks/releases/download/v0.1.1/resocks_Linux_arm64.tar.gz
         dest: /opt/tools/resocks/
       when: ansible_facts.architecture != "x86_64"
         
     - name: Download resocks
       ansible.builtin.get_url:
         url: https://github.com/RedTeamPentesting/resocks/releases/latest/download/resocks_Windows_x86_64.zip
         dest: /opt/tools/resocks/

     - name: Download SharpGPOAbuse 
       ansible.builtin.get_url:
         url: https://github.com/byronkg/SharpGPOAbuse/releases/download/1.0/SharpGPOAbuse.exe
         dest: /opt/tools/

     - name: Create Chainsaw-Folder
       ansible.builtin.file:
         path: /opt/tools/chainsaw
         state: directory

     - name: Download chainsaw
       ansible.builtin.get_url:
         url: https://github.com/WithSecureLabs/chainsaw/releases/latest/download/chainsaw_all_platforms+rules.zip
         dest: /opt/tools/chainsaw/
         
     - name: Download phpreverseshell
       ansible.builtin.get_url:
         url: https://raw.githubusercontent.com/pentestmonkey/php-reverse-shell/master/php-reverse-shell.php
         dest: /opt/tools/

     - name: Recursively change ownership of /home/kali/.config/rofi
       ansible.builtin.file:
         path: /opt/tools/bloodhound
         state: directory
         recurse: yes
         owner: 1000
         group: 1000

     - name: Download bloodhound
       ansible.builtin.get_url:
         url: https://raw.githubusercontent.com/SpecterOps/BloodHound/refs/heads/main/examples/docker-compose/docker-compose.yml
         dest: /opt/tools/bloodhound/docker-compose.yml

     - name: Get latest Ghidra release info
       ansible.builtin.uri:
         url: https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/latest
         return_content: yes
       register: ghidra_release

     - name: Set Ghidra release facts
       ansible.builtin.set_fact:
         ghidra_zip_url: "{{ ghidra_release.json.assets | selectattr('name', 'match', '.*PUBLIC.*\\.zip$') | map(attribute='browser_download_url') | first }}"
         ghidra_zip_name: "{{ ghidra_release.json.assets | selectattr('name', 'match', '.*PUBLIC.*\\.zip$') | map(attribute='name') | first }}"

     - name: Set Ghidra directory name
       ansible.builtin.set_fact:
         ghidra_dir: "{{ ghidra_zip_name | regex_replace('_\\d{8}\\.zip$', '') }}"

     - name: Download Ghidra
       ansible.builtin.get_url:
         url: "{{ ghidra_zip_url }}"
         dest: /tmp/ghidra.zip

     - name: Extract Ghidra to /opt/tools
       ansible.builtin.unarchive:
         src: /tmp/ghidra.zip
         dest: /opt/tools/
         remote_src: yes
         creates: "/opt/tools/{{ ghidra_dir }}"

     - name: Symlink Ghidra
       ansible.builtin.file:
         src: "/opt/tools/{{ ghidra_dir }}"
         dest: /opt/tools/ghidra
         state: link

     - name: Symlink Ghidra to PATH
       ansible.builtin.file:
         src: /opt/tools/ghidra/ghidraRun
         dest: /usr/local/bin/ghidra
         state: link

     - name: Git Pull GhidraMCP
       git:
         repo: https://github.com/LaurieWired/GhidraMCP
         dest: /opt/tools/GhidraMCP

     - name: Get latest GhidraMCP release info
       ansible.builtin.uri:
         url: https://api.github.com/repos/LaurieWired/GhidraMCP/releases/latest
         return_content: yes
       register: ghidramcp_release

     - name: Download GhidraMCP extension
       ansible.builtin.get_url:
         url: "{{ ghidramcp_release.json.assets | selectattr('name', 'match', '.*\\.zip$') | map(attribute='browser_download_url') | first }}"
         dest: /opt/tools/GhidraMCP/

     - name: Create GhidraMCP virtual environment
       ansible.builtin.command:
         cmd: python3 -m venv /opt/tools/GhidraMCP/venv
         creates: /opt/tools/GhidraMCP/venv

     - name: Install GhidraMCP Python dependencies
       ansible.builtin.pip:
         requirements: /opt/tools/GhidraMCP/requirements.txt
         virtualenv: /opt/tools/GhidraMCP/venv

     - name: Git Pull caido skills
       git:
         repo: https://github.com/caido/skills
         dest: /opt/tools/caido-skills

     - name: Create Claude config directory
       ansible.builtin.file:
         path: /home/kali/.claude
         state: directory
         owner: 1000
         group: 1000
         mode: '0700'

     - name: Create Claude skills directory
       ansible.builtin.file:
         path: /home/kali/.claude/skills
         state: directory
         owner: 1000
         group: 1000
         mode: '0700'

     - name: Symlink caido-mode skill
       ansible.builtin.file:
         src: /opt/tools/caido-skills/skills/caido-mode
         dest: /home/kali/.claude/skills/caido-mode
         state: link
         owner: 1000
         group: 1000

     - name: Configure GhidraMCP as Claude MCP server
       ansible.builtin.copy:
         dest: /home/kali/.claude/.mcp.json
         owner: 1000
         group: 1000
         mode: '0600'
         content: |
           {
             "mcpServers": {
               "ghidra": {
                 "command": "/opt/tools/GhidraMCP/venv/bin/python3",
                 "args": [
                   "/opt/tools/GhidraMCP/bridge_mcp_ghidra.py",
                   "--ghidra-server",
                   "http://127.0.0.1:4711/"
                 ]
               }
             }
           }

     - name: Install nvm
       ansible.builtin.shell:
         cmd: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash
         creates: /home/kali/.nvm/nvm.sh
       become_user: kali

     - name: Install Node.js 24 via nvm
       ansible.builtin.shell:
         cmd: . "$HOME/.nvm/nvm.sh" && nvm install 24
         creates: /home/kali/.nvm/versions/node/v24*
         executable: /bin/bash
       become_user: kali

     - name: Install caido-mode skill dependencies
       ansible.builtin.shell:
         cmd: . "$HOME/.nvm/nvm.sh" && nvm use 24 && npm install
         chdir: /home/kali/.claude/skills/caido-mode
         creates: /home/kali/.claude/skills/caido-mode/node_modules
         executable: /bin/bash
       become_user: kali

     - name: Create shodan_recon directory
       ansible.builtin.file:
         path: /opt/tools/shodan_recon
         state: directory

     - name: Create shodan_recon virtual environment
       ansible.builtin.command:
         cmd: python3 -m venv /opt/tools/shodan_recon/.venv
         creates: /opt/tools/shodan_recon/.venv

     - name: Install shodan in shodan_recon venv
       ansible.builtin.pip:
         name: shodan
         virtualenv: /opt/tools/shodan_recon/.venv

     - name: Recursively change ownership of /opt
       ansible.builtin.file:
         path: /opt/tools
         state: directory
         recurse: yes
         owner: 1000
         group: 1000

     - name: Recursively change ownership of /home/kali/.config/i3status
       ansible.builtin.file:
         path: /home/kali/.config/i3status
         state: directory
         recurse: yes
         owner: 1000
         group: 1000
         
     - name: Recursively change ownership of /home/kali/.config/i3
       ansible.builtin.file:
         path: /home/kali/.config/i3
         state: directory
         recurse: yes
         owner: 1000
         group: 1000

     - name: Recursively change ownership of /home/kali/.config/rofi
       ansible.builtin.file:
         path: /home/kali/.config/rofi
         state: directory
         recurse: yes
         owner: 1000
         group: 1000
         
     - name: Copy i3status config-file
       ansible.builtin.copy:
         src: ./i3status.conf
         dest: /home/kali/.config/i3status/config
         owner: 1000
         group: 1000
         mode: '0600'
         
     - name: Copy i3 config-file
       ansible.builtin.copy:
         src: ./i3config
         dest: /home/kali/.config/i3/config
         owner: 1000
         group: 1000
         mode: '0600'

     - name: Copy rofi config-file
       ansible.builtin.copy:
         src: ./config.rasi
         dest: /home/kali/.config/rofi/config.rasi
         owner: 1000
         group: 1000
         mode: '0600'
